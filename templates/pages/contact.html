{% load static %}

<!-- Contact section -->
<div class="ld-plan-wrapper">
  <div class="container">
    <div class="row">
      <div class="ld-choose-left ld-choose-center">
        <h2>Get in Touch With Us</h2>
        <h1>Contact Information</h1>
      </div>
    </div>
    {% if contact_formation %}
    <div class="row">
      {% for item in contact_formation %}
      <div class="col-lg-3 col-md-6 col-sm-12">
        <div class="ld-add-box">
          <div class="ld-icone">
            <i class="{{item.icom}}" aria-hidden="true"></i>
          </div>
          <h6>{{item.get_category_display}}</h6>
          <address>{{item.value}}</address>
        </div>
      </div>
      {% endfor %}
      <!-- <div class="col-lg-3 col-md-6 col-sm-12">
        <div class="ld-add-box">
          <div class="ld-icone">
            <i class="fa fa-clock-o" aria-hidden="true"></i>
          </div>
          <h6>Opening Hours</h6>
          <address>Mon-Fri 08:00 AM - 05:00 PM</address>
        </div>
      </div> -->
    </div>
    {% endif %}
  </div>
</div>
<!-- Contact section end-->

<!-- map section -->
<div class="ld-plan-wrapper" id="contact">
  <div class="container">
    <div class="row">
      <div class="col-sm-12">
        <div class="ld-contact-white-form">
          <h1>Drop us a message</h1>
          <form class="was-validated" action="{{request.path}}" method="post">
            {% csrf_token %}
            <div class="row">
              <div class="col-lg-12 col-md-12 col-sm-12 col-12">
                <div class="ld-field_holder form_error">
                  {{form.name}}
                  <div class="help-block with-errors"></div>
                </div>
              </div>

              <div class="col-lg-12 col-md-12 col-sm-12 col-12">
                <div class="ld-field_holder">
                  {{form.phone}}
                  <div class="help-block with-errors"></div>
                </div>
              </div>
              <div class="col-lg-12 col-md-12 col-sm-12 col-12">
                <div class="ld-field_holder">
                  {{form.message}}
                  <div class="help-block with-errors"></div>
                </div>
              </div>
              <div class="col-lg-12 col-md-12 col-sm-12 col-12">
                <button
                  type="submit"
                  class="vr_btn submitForm"
                  id="form-submit"
                >
                  Submit
                </button>
                <!-- <div class="response">You missed out some fields.</div> -->
                <div class="response"></div>
              </div>
            </div>
            <div id="msgSubmit" class="h3 text-center hidden"></div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
    $(document).ready(function(){
        $("form.was-validated").on(function(event){
            event.preventDefault();
            
        })
    })
</script>
