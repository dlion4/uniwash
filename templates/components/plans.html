{% load static %}

<div class="ld-plan-wrapper">
  <div class="container">
    <div class="row">
      <div class="col-lg-12">
        <div class="ld-all-heading">
          <h1>The Right Plan For You</h1>
        </div>
      </div>
    </div>
    <div class="ld-plan-section">
      <div class="row">
        <div class="col-lg-12">
          <div class="ld-price-table">
            <h2>Basic Price List</h2>
            <table class="table table-borderless">
              <thead>
                <tr>
                  {% for item in item_services_price %}
                  <th>{{item}}</th>
                  {% endfor %}
                </tr>
              </thead>
              <tbody>
                {% for item in item_services_price %}
                <!--  -->
                {% for dt in item.get_pricing_item %}
                <tr>
                  <td>{{item.item}}</td>
                  <td>{{dt.price}}</td>
                  <td><img src="{% static 'images/cross.png' %}" alt="" /></td>
                  <td><img src="{% static 'images/green.png' %}" alt="" /></td>
                </tr>
                {% endfor %}
                <!--  -->
                {% endfor %}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
